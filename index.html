<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Encuesta Suscripción — Didáct&Co.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1B6DB5;--green:#4BAF48;--orange:#F47920;--magenta:#E8197A;--yellow:#F5C200;--teal:#00A99D;--purple:#7B3FA0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F7;min-height:100vh}
.sw{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-bottom:2rem}
.sw-header{width:100%;background:#fff;border-bottom:3px solid #F0F0F0;padding:.75rem 1.5rem;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.sw-header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,#1B6DB5 0%,#4BAF48 33%,#F47920 66%,#E8197A 100%)}
.logo-img{height:54px;object-fit:contain;margin-left:4px}
.sw-header-info{margin-left:auto;text-align:right}
.badge-teal{display:inline-block;background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.04em}
.sw-header-info p{font-size:12px;color:#999;margin-top:3px}
.prog-wrap{width:100%;padding:10px 1.5rem 0}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:5px}
.prog-track{height:5px;border-radius:99px;background:#EEE;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--teal),var(--green));transition:width .4s ease}
.dots-row{display:flex;gap:5px;justify-content:center;padding:8px 0 0}
.dot{width:7px;height:7px;border-radius:50%;background:#DDD;transition:all .3s}
.dot.done{background:var(--green)}
.dot.active{background:var(--blue);width:18px;border-radius:99px}
.card{width:100%;max-width:560px;background:#fff;border:1.5px solid #E8E8E8;border-radius:16px;padding:1.5rem 1.5rem 1.25rem;margin:1rem 1rem .5rem}
.step-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px 3px 8px;border-radius:99px;margin-bottom:.75rem}
.question{font-size:17px;font-weight:700;color:#1a1a1a;line-height:1.4;margin-bottom:1rem}
.hint{font-size:13px;color:#888;margin-bottom:1rem;margin-top:-.5rem}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opts-grid.cols1{grid-template-columns:1fr}
.opt{display:flex;align-items:center;gap:10px;padding:11px 13px;border:2px solid transparent;border-radius:12px;cursor:pointer;text-align:left;font-size:14px;transition:border-color .15s,filter .15s;width:100%;font-family:inherit}
.opt-lbl{font-weight:600;font-size:14px}
.opt-sub{font-size:11px;margin-top:1px;opacity:.75}
.opt:active{filter:brightness(.93)}
.opt-c0{background:#EAF2FD;color:#1B6DB5;border-color:#B5D4F4}.opt-c0.sel{background:#C8DFFA;border-color:#1B6DB5}
.opt-c1{background:#EAF7EA;color:#2E7D2C;border-color:#B0DDB0}.opt-c1.sel{background:#C2ECC2;border-color:#4BAF48}
.opt-c2{background:#FEF3E9;color:#B85A10;border-color:#F9C49A}.opt-c2.sel{background:#FDE0C4;border-color:#F47920}
.opt-c3{background:#FDEDF4;color:#A8115A;border-color:#F4AACC}.opt-c3.sel{background:#F9CBDF;border-color:#E8197A}
.opt-c4{background:#E4F7F6;color:#007A73;border-color:#99DDDA}.opt-c4.sel{background:#C0EDEA;border-color:#00A99D}
.tags-wrap{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:8px 14px;border:2px solid transparent;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;transition:filter .15s;font-family:inherit}
.tag:active{filter:brightness(.9)}
.tag.t0{background:#EAF2FD;color:#1B6DB5;border-color:#B5D4F4}.tag.t0.sel{background:#C8DFFA;border-color:#1B6DB5;font-weight:700}
.tag.t1{background:#EAF7EA;color:#2E7D2C;border-color:#B0DDB0}.tag.t1.sel{background:#C2ECC2;border-color:#4BAF48;font-weight:700}
.tag.t2{background:#FEF3E9;color:#B85A10;border-color:#F9C49A}.tag.t2.sel{background:#FDE0C4;border-color:#F47920;font-weight:700}
.tag.t3{background:#FDEDF4;color:#A8115A;border-color:#F4AACC}.tag.t3.sel{background:#F9CBDF;border-color:#E8197A;font-weight:700}
.tag.t4{background:#E4F7F6;color:#007A73;border-color:#99DDDA}.tag.t4.sel{background:#C0EDEA;border-color:#00A99D;font-weight:700}
.tag.t5{background:#F3ECF9;color:#5A2D80;border-color:#C9A8E0}.tag.t5.sel{background:#DFC8F2;border-color:#7B3FA0;font-weight:700}
.tag.t6{background:#FEF9E3;color:#9A7800;border-color:#F5D87A}.tag.t6.sel{background:#FCF0B4;border-color:#D4A900;font-weight:700}
.tag.t7{background:#EAF2FD;color:#1B6DB5;border-color:#B5D4F4}.tag.t7.sel{background:#C8DFFA;border-color:#1B6DB5;font-weight:700}
.tag.t8{background:#EAF7EA;color:#2E7D2C;border-color:#B0DDB0}.tag.t8.sel{background:#C2ECC2;border-color:#4BAF48;font-weight:700}
.counter-note{font-size:12px;color:#999;margin-top:8px}
.scale-wrap{display:flex;gap:7px}
.scale-btn{flex:1;height:52px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;border:2px solid transparent;border-radius:12px;cursor:pointer;transition:filter .15s;font-family:inherit}
.scale-btn:active{filter:brightness(.9)}
.sc1{background:#FDEDF4;color:#A8115A;border-color:#F4AACC}.sc1.sel{background:#F9CBDF;border-color:#E8197A}
.sc2{background:#FEF3E9;color:#B85A10;border-color:#F9C49A}.sc2.sel{background:#FDE0C4;border-color:#F47920}
.sc3{background:#FEF9E3;color:#9A7800;border-color:#F5D87A}.sc3.sel{background:#FCF0B4;border-color:#D4A900}
.sc4{background:#E4F7F6;color:#007A73;border-color:#99DDDA}.sc4.sel{background:#C0EDEA;border-color:#00A99D}
.sc5{background:#EAF7EA;color:#2E7D2C;border-color:#B0DDB0}.sc5.sel{background:#C2ECC2;border-color:#4BAF48}
.scale-lbl{display:flex;justify-content:space-between;font-size:11px;color:#999;margin-top:5px}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.price-card{padding:16px 12px;border:2px solid transparent;border-radius:12px;cursor:pointer;text-align:center;transition:filter .15s}
.price-card:active{filter:brightness(.93)}
.pc0{background:#EAF2FD;color:#1B6DB5;border-color:#B5D4F4}.pc0.sel{background:#C8DFFA;border-color:#1B6DB5}
.pc1{background:#EAF7EA;color:#2E7D2C;border-color:#B0DDB0}.pc1.sel{background:#C2ECC2;border-color:#4BAF48}
.pc2{background:#FEF3E9;color:#B85A10;border-color:#F9C49A}.pc2.sel{background:#FDE0C4;border-color:#F47920}
.pc3{background:#FDEDF4;color:#A8115A;border-color:#F4AACC}.pc3.sel{background:#F9CBDF;border-color:#E8197A}
.price-card .amt{font-size:20px;font-weight:800}
.price-card .per{font-size:11px;opacity:.7;margin-top:3px}
.fi-group{display:flex;flex-direction:column;gap:10px}
.fi-row{display:flex;flex-direction:column;gap:4px}
.fi-label{font-size:13px;font-weight:600;color:#555}
.fi-input{height:46px;padding:0 13px;font-size:16px;border:2px solid #DDD;border-radius:10px;outline:none;background:#FAFAFA;color:#1a1a1a;font-family:inherit;transition:border-color .15s;-webkit-appearance:none}
.fi-input:focus{border-color:var(--blue);background:#fff}
.textarea-inp{width:100%;min-height:88px;padding:10px 13px;font-size:16px;font-family:inherit;color:#1a1a1a;border:2px solid #DDD;border-radius:10px;outline:none;resize:vertical;background:#FAFAFA;transition:border-color .15s;-webkit-appearance:none}
.textarea-inp:focus{border-color:var(--blue);background:#fff}
.nav-row{width:100%;max-width:560px;display:flex;gap:9px;padding:0 1rem .5rem}
.btn-back{height:48px;padding:0 18px;background:#fff;border:2px solid #DDD;border-radius:12px;font-size:14px;font-weight:600;color:#888;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s}
.btn-back:hover{border-color:var(--blue);color:var(--blue)}
.btn-next{flex:1;height:48px;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;background:linear-gradient(90deg,var(--blue) 0%,var(--teal) 100%);transition:opacity .15s,transform .1s}
.btn-next:hover{opacity:.9}
.btn-next:active{transform:scale(.98)}
.btn-next:disabled{background:#CCC;cursor:default;opacity:1}
.hidden{display:none!important}
.ty-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;padding:1.5rem .5rem}
.ty-icon-row{display:flex;gap:10px;margin-bottom:1.25rem}
.ty-dot{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px}
.ty-title{font-size:22px;font-weight:800;color:#1a1a1a;margin-bottom:.5rem}
.ty-sub{font-size:14px;color:#555;line-height:1.6;max-width:380px;margin-bottom:1rem}
.ty-tagline{font-size:16px;font-weight:800}
.btn-reset{margin-top:1.25rem;height:46px;padding:0 28px;background:var(--blue);border:none;border-radius:12px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:600px){.opts-grid{grid-template-columns:1fr!important}.price-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycbxVggNsg8goONawC1owMC9sjhLJFG6oQpLaowJWn1_qwnezs4JhxJsMgTwlUoeXlhw/exec';
const BADGE_META=[
  {bg:'#EAF2FD',color:'#1B6DB5',icon:'👤'},
  {bg:'#EAF7EA',color:'#2E7D2C',icon:'⭐'},
  {bg:'#FEF3E9',color:'#B85A10',icon:'🏷️'},
  {bg:'#FEF9E3',color:'#9A7800',icon:'🎂'},
  {bg:'#FDEDF4',color:'#A8115A',icon:'❤️'},
  {bg:'#EAF2FD',color:'#1B6DB5',icon:'📅'},
  {bg:'#E4F7F6',color:'#007A73',icon:'💰'},
  {bg:'#F3ECF9',color:'#5A2D80',icon:'💎'},
  {bg:'#FEF3E9',color:'#B85A10',icon:'💬'},
  {bg:'#EAF7EA',color:'#2E7D2C',icon:'📋'},
];
const steps=[
  {id:'perfil',type:'single',label:'¿Quién sos?',si:0,question:'¿Cuál describe mejor tu rol?',options:[{v:'docente',l:'Docente',s:'Nivel inicial, primario o medio',c:0},{v:'profesional',l:'Profesional',s:'Psico, fonoaudiología, TO…',c:1},{v:'familia',l:'Familia',s:'Padre, madre o cuidador/a',c:2},{v:'otro',l:'Otro',s:'Directivo, coordinador, etc.',c:3}]},
  {id:'conocimiento',type:'single',label:'¿Ya nos conocías?',si:1,question:'¿Ya conocías el catálogo de Didáct&Co.?',options:[{v:'si_compre',l:'Sí, y ya compré',s:'',c:0},{v:'si_nunca',l:'Sí, pero no compré',s:'',c:1},{v:'no_ahora',l:'Acabo de conocerlos',s:'',c:2}]},
  {id:'materiales',type:'multi',label:'¿Qué materiales te interesan?',si:2,question:'¿Qué tipo de materiales te interesan más?',hint:'Podés elegir más de uno.',options:['Lenguaje y comunicación','Fonético fonológico','Matemática y lógica','Emociones y habilidades sociales','Juego simbólico y creatividad','Atención y memoria','Integración sensorial','Primeras infancias (0–3 años)','Adultos mayores']},
  {id:'edad',type:'single',label:'Rango de edad',si:3,question:'¿Con qué rango de edad trabajás o convivís principalmente?',options:[{v:'0-6',l:'0 – 6 años',s:'Primera infancia',c:0},{v:'6-12',l:'6 – 12 años',s:'Infancia',c:1},{v:'12-18',l:'12 – 18 años',s:'Adolescencia',c:2},{v:'+18',l:'+18 años',s:'Adultos y adultos mayores',c:3}]},
  {id:'interes',type:'scale',label:'¿Qué te parece la idea?',si:4,question:'Una suscripción mensual te daría acceso a una gran variedad de materiales para usar durante ese período. ¿Qué tan interesante te resulta?',hint:'1 = nada interesante · 5 = muy interesante',scale:5},
  {id:'frecuencia',type:'single',label:'¿Con qué frecuencia comprás?',si:5,question:'¿Con qué frecuencia buscás o comprás materiales educativos?',options:[{v:'mensual',l:'Mensualmente',s:'',c:0},{v:'trimestral',l:'Cada 2–3 meses',s:'',c:1},{v:'anual',l:'Una o dos veces al año',s:'',c:2},{v:'nunca',l:'Casi nunca compro',s:'',c:3}]},
  {id:'precio',type:'price',label:'¿Cuánto pagarías?',si:6,question:'¿Cuánto estarías dispuesto/a a pagar por mes por acceso al catálogo?',prices:[{v:'500',l:'$500',p:'/ mes',c:0},{v:'800',l:'$800',p:'/ mes',c:1},{v:'1200',l:'$1.200',p:'/ mes',c:2},{v:'1500',l:'$1.500+',p:'/ mes',c:3}]},
  {id:'beneficios',type:'multi',label:'¿Qué más valorarías?',si:7,question:'¿Qué beneficios te resultarían más valiosos?',hint:'Elegí hasta 3.',maxSelect:3,options:['Acceso a una gran variedad de materiales','Nuevos materiales cada mes','Descuentos en materiales físicos','Comunidad y recursos para profesionales','Cancelación en cualquier momento']},
  {id:'comentario',type:'text',label:'Tu opinión libre',si:8,optional:true,question:'¿Hay algo más que quieras contarnos? Sugerencias, dudas o lo que se te ocurra.'},
  {id:'contacto',type:'contact',label:'¡Quedate al tanto!',si:9,optional:true,question:'¿Querés que te avisemos cuando lancemos la suscripción?',hint:'Dejanos tu nombre y mail — prometemos no hacer spam 💌'},
];
let current=0;const answers={};
function showToast(msg,ok){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'#2E7D2C':'#c0392b';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);
}
function buildDots(){
  const row=document.getElementById('dots-row');row.innerHTML='';
  steps.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i<current?' done':i===current?' active':'');row.appendChild(d);});
}
function renderStep(idx){
  const s=steps[idx];const pct=Math.round((idx/steps.length)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('step-lbl').textContent='Pregunta '+(idx+1)+' de '+steps.length;
  document.getElementById('pct-lbl').textContent=pct+'%';
  buildDots();
  const bm=BADGE_META[s.si]||BADGE_META[0];
  let html='<div class="step-badge" style="background:'+bm.bg+';color:'+bm.color+'">'+bm.icon+' '+s.label+'</div>';
  html+='<div class="question">'+s.question+'</div>';
  if(s.hint)html+='<div class="hint">'+s.hint+'</div>';
  if(s.type==='single'){
    const cols=s.options.length<=2?'cols1':'';
    html+='<div class="opts-grid '+cols+'" id="opts">';
    s.options.forEach(o=>{const isSel=answers[s.id]===o.v?' sel':'';html+='<button type="button" class="opt opt-c'+o.c+isSel+'" data-v="'+o.v+'"><span><div class="opt-lbl">'+o.l+'</div>'+(o.s?'<div class="opt-sub">'+o.s+'</div>':'')+'</span></button>';});
    html+='</div>';
  }
  if(s.type==='multi'){
    const sel=answers[s.id]||[];const maxS=s.maxSelect||999;
    html+='<div class="tags-wrap" id="opts">';
    s.options.forEach((o,i)=>{const ci=i%9;const isSel=sel.includes(o)?' sel':'';html+='<button type="button" class="tag t'+ci+isSel+'" data-v="'+o+'">'+o+'</button>';});
    html+='</div>';
    if(s.maxSelect)html+='<div class="counter-note" id="cnt">Seleccionados: '+(sel.length)+'/'+maxS+'</div>';
  }
  if(s.type==='scale'){
    const cur=answers[s.id]||null;
    html+='<div class="scale-wrap" id="opts">';
    for(let i=1;i<=s.scale;i++){const isSel=cur==i?' sel':'';html+='<button type="button" class="scale-btn sc'+i+isSel+'" data-v="'+i+'">'+i+'</button>';}
    html+='</div><div class="scale-lbl"><span>Nada interesante</span><span>Muy interesante</span></div>';
  }
  if(s.type==='price'){
    html+='<div class="price-grid" id="opts">';
    s.prices.forEach(p=>{const isSel=answers[s.id]===p.v?' sel':'';html+='<div class="price-card pc'+p.c+isSel+'" data-v="'+p.v+'" role="button" tabindex="0"><div class="amt">'+p.l+'</div><div class="per">'+p.p+'</div></div>';});
    html+='</div>';
  }
  if(s.type==='text')html+='<textarea class="textarea-inp" id="free-text" placeholder="Tu respuesta...">'+(answers[s.id]||'')+'</textarea>';
  if(s.type==='contact'){
    const d=answers[s.id]||{};
    html+='<div class="fi-group"><div class="fi-row"><label class="fi-label" for="fi-n">Tu nombre</label><input class="fi-input" id="fi-n" type="text" placeholder="¿Cómo te llamás?" value="'+(d.nombre||'')+'" autocomplete="name"></div><div class="fi-row"><label class="fi-label" for="fi-e">Tu correo electrónico</label><input class="fi-input" id="fi-e" type="email" placeholder="hola@ejemplo.com" value="'+(d.email||'')+'" autocomplete="email"></div></div>';
  }
  const card=document.createElement('div');card.className='card';card.innerHTML=html;
  const container=document.getElementById('step-container');container.innerHTML='';container.appendChild(card);
  document.getElementById('btn-back').classList.toggle('hidden',idx===0);
  document.getElementById('btn-next').textContent=idx===steps.length-1?'¡Enviar encuesta! ✓':'Continuar →';
  updateNext();attachEvents(s);
}
function attachEvents(s){
  if(s.type==='single'){document.querySelectorAll('#opts .opt').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#opts .opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');answers[s.id]=btn.dataset.v;updateNext();});});}
  if(s.type==='multi'){const max=s.maxSelect||999;document.querySelectorAll('#opts .tag').forEach(btn=>{btn.addEventListener('click',()=>{const cur=answers[s.id]||[];const v=btn.dataset.v;if(cur.includes(v)){answers[s.id]=cur.filter(x=>x!==v);btn.classList.remove('sel');}else if(cur.length<max){answers[s.id]=[...cur,v];btn.classList.add('sel');}const cnt=document.getElementById('cnt');if(cnt)cnt.textContent='Seleccionados: '+((answers[s.id]||[]).length)+'/'+max;updateNext();});});}
  if(s.type==='scale'){document.querySelectorAll('#opts .scale-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#opts .scale-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');answers[s.id]=btn.dataset.v;updateNext();});});}
  if(s.type==='price'){document.querySelectorAll('#opts .price-card').forEach(card=>{card.addEventListener('click',()=>{document.querySelectorAll('#opts .price-card').forEach(c=>c.classList.remove('sel'));card.classList.add('sel');answers[s.id]=card.dataset.v;updateNext();});});}
  if(s.type==='text'){const ta=document.getElementById('free-text');if(ta)ta.addEventListener('input',()=>{answers[s.id]=ta.value;});}
  if(s.type==='contact'){const n=document.getElementById('fi-n');const e=document.getElementById('fi-e');const upd=()=>{answers[s.id]={nombre:n?n.value:'',email:e?e.value:''};};if(n)n.addEventListener('input',upd);if(e)e.addEventListener('input',upd);}
}
function updateNext(){
  const s=steps[current];const btn=document.getElementById('btn-next');
  if(s.optional||s.type==='contact'||s.type==='text'){btn.disabled=false;return;}
  const a=answers[s.id];btn.disabled=s.type==='multi'?!(a&&a.length>0):!a;
}
function sendToSheets(payload){
  return new Promise((resolve)=>{
    const cbName='jsonp_cb_'+Date.now();
    const params=new URLSearchParams({
      callback:cbName,
      fecha:payload.fecha||'',
      perfil:payload.perfil||'',
      conocimiento:payload.conocimiento||'',
      materiales:payload.materiales||'',
      edad:payload.edad||'',
      interes:payload.interes||'',
      frecuencia:payload.frecuencia||'',
      precio:payload.precio||'',
      beneficios:payload.beneficios||'',
      comentario:payload.comentario||'',
      nombre:payload.nombre||'',
      email:payload.email||''
    });
    window[cbName]=function(data){
      delete window[cbName];
      document.getElementById('jsonp-script')&&document.getElementById('jsonp-script').remove();
      resolve(data);
    };
    const sc=document.createElement('script');
    sc.id='jsonp-script';
    sc.src=SHEETS_URL+'?'+params.toString();
    sc.onerror=()=>resolve({result:'error'});
    document.head.appendChild(sc);
    setTimeout(()=>resolve({result:'timeout'}),8000);
  });
}
function showThankYou(){
  document.getElementById('prog').style.width='100%';
  document.getElementById('step-lbl').textContent='¡Completada!';
  document.getElementById('pct-lbl').textContent='100%';
  document.getElementById('nav-row').classList.add('hidden');
  buildDots();
  const payload={
    fecha:new Date().toLocaleString('es-UY'),
    perfil:answers.perfil||'',
    conocimiento:answers.conocimiento||'',
    materiales:(answers.materiales||[]).join(', '),
    edad:answers.edad||'',
    interes:answers.interes||'',
    frecuencia:answers.frecuencia||'',
    precio:answers.precio||'',
    beneficios:(answers.beneficios||[]).join(', '),
    comentario:answers.comentario||'',
    nombre:(answers.contacto||{}).nombre||'',
    email:(answers.contacto||{}).email||''
  };
  sendToSheets(payload).then((res)=>{
    if(res&&res.result==='ok'){showToast('✓ Respuesta guardada en Google Sheets',true);}
    else{showToast('⚠ No se pudo guardar — revisá la conexión',false);}
  });
  document.getElementById('step-container').innerHTML='<div class="card"><div class="ty-wrap"><div class="ty-icon-row"><div class="ty-dot" style="background:#EAF2FD">❤️</div><div class="ty-dot" style="background:#EAF7EA">⭐</div><div class="ty-dot" style="background:#FEF3E9">🎲</div></div><div class="ty-title">¡Muchas gracias!</div><div class="ty-sub">Tu opinión nos ayuda a construir mejores herramientas para aprender jugando. ¡Hasta pronto en el stand!</div><div class="ty-tagline"><span style="color:#1B6DB5">Didáct</span><span style="color:#4BAF48">&</span><span style="color:#F47920">Co.</span> <span style="color:#999;font-weight:400">—</span> <span style="color:#E8197A">aprender jugando</span></div><button class="btn-reset" id="btn-reset" type="button">Nueva respuesta →</button></div></div>';
  document.getElementById('btn-reset').addEventListener('click',()=>{Object.keys(answers).forEach(k=>delete answers[k]);current=0;document.getElementById('nav-row').classList.remove('hidden');renderStep(0);});
}
document.getElementById('btn-next').addEventListener('click',()=>{if(current<steps.length-1){current++;renderStep(current);}else showThankYou();});
document.getElementById('btn-back').addEventListener('click',()=>{if(current>0){current--;renderStep(current);}});
renderStep(0);
</script>
